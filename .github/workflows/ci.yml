name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Prisma, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lgu_kiosk
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/lgu_kiosk
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (warnings are errors)
        run: npm run lint

      - name: Check Prisma schema and client
        run: npm run prisma:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
